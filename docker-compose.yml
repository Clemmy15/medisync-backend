services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medisync
      POSTGRES_PASSWORD: medisync
      POSTGRES_DB: medisync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medisync"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://medisync:medisync@db:5432/medisync
      DEBUG: "true"
      SECRET_KEY: local-docker-dev-only-secret-key-32chars-minimum-required
      LLM_PROVIDER: mock
      CHROMA_PERSIST_DIR: /app/data/chroma
    volumes:
      - chroma_data:/app/data/chroma
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
  chroma_data:
